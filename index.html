<!DOCTYPE html>
<html>
<head>
<title>Love Question</title>

<style>

body{
font-family: Arial;
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
}

/* card */

.card{
background:rgba(255,255,255,0.85);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
z-index:10;
animation:pop 1s ease;
position:relative;
}

@keyframes pop{
0%{transform:scale(0.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h2{
color:#ff4d6d;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.yes{background:#ff4d6d;color:white;}
.no{background:#555;color:white;}

button:hover{
transform:scale(1.1);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#msg{
margin-top:10px;
font-weight:bold;
color:#ff4d6d;
}

/* hearts */

.heart{
position:absolute;
bottom:-50px;
animation:floatUp linear forwards, glow 1.5s infinite alternate;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

@keyframes glow{
0%{text-shadow:0 0 10px #ff4d6d;}
100%{text-shadow:0 0 30px #ff4d6d;}
}

/* butterflies */

.butterfly{
position:absolute;
animation:flyRandom linear forwards, flutter 0.3s infinite alternate;
}

@keyframes flyRandom{
0%{transform:translate(0,0);}
25%{transform:translate(200px,-150px);}
50%{transform:translate(-150px,200px);}
75%{transform:translate(150px,-100px);}
100%{transform:translate(400px,150px);}
}

@keyframes flutter{
0%{transform:scale(1);}
100%{transform:scale(1.15);}
}

/* roses */

.rose{
position:absolute;
bottom:-50px;
animation:floatUp linear forwards;
}

/* angels */

.angel{
position:absolute;
animation:angelFly linear forwards;
}

@keyframes angelFly{
0%{transform:translate(0,0);}
50%{transform:translate(200px,-150px);}
100%{transform:translate(-200px,200px);}
}

</style>
</head>

<body>

<div class="card">

<h2>
Unna patha theriyathu…  
Ana pesuna theriyum nee oru Lossu nu 😜  
Neeye sollu ama va illa ya?
</h2>

<button class="yes" onclick="yesClick()">Ama Naan Lossu 😅</button>

<button class="no" id="noBtn" onclick="noClick()">Illa Naan Nalla Ponnu 😎</button>

<p id="msg"></p>

</div>

<script>

let count=0;
let noBtn=document.getElementById("noBtn");

/* YES BUTTON */

function yesClick(){
window.location="letter.html";
}

/* NO BUTTON */

function noClick(){

count++;

if(count==1){
msg.innerHTML="Apo konjam lossu dhaan 🤭";
}

else if(count==2){
msg.innerHTML="Nijam sollu 😜";
}

else if(count==3){
msg.innerHTML="Button ah pidika mudiyuma paakalam 😆";
noBtn.style.position="absolute";
moveButton();
}

else if(count<=6){
moveButton();
}

else{
msg.innerHTML="Seri seri... unaku option illa 😜";
noBtn.style.display="none";
}

}

function moveButton(){

let x=Math.random()*window.innerWidth*0.6;
let y=Math.random()*window.innerHeight*0.6;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

/* hearts */

function createHeart(){

let heart=document.createElement("div");
heart.classList.add("heart");

let hearts=["❤️","💖","💕","💗","💓","💞"];

heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(40+Math.random()*35)+"px";
heart.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},12000);

}

setInterval(createHeart,300);

/* butterflies */

function createButterfly(){

let butterfly=document.createElement("div");
butterfly.classList.add("butterfly");

butterfly.innerHTML="🦋";

butterfly.style.top=Math.random()*100+"vh";
butterfly.style.left=Math.random()*100+"vw";

butterfly.style.fontSize=(30+Math.random()*25)+"px";
butterfly.style.animationDuration=(10+Math.random()*10)+"s";

document.body.appendChild(butterfly);

setTimeout(()=>{
butterfly.remove();
},15000);

}

setInterval(createButterfly,2000);

/* roses */

function createRose(){

let rose=document.createElement("div");
rose.classList.add("rose");

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";
rose.style.fontSize=(35+Math.random()*30)+"px";
rose.style.animationDuration=(7+Math.random()*6)+"s";

document.body.appendChild(rose);

setTimeout(()=>{
rose.remove();
},12000);

}

setInterval(createRose,900);

/* angels */

function createAngel(){

let angel=document.createElement("div");
angel.classList.add("angel");

angel.innerHTML="👼";

angel.style.top=Math.random()*100+"vh";
angel.style.left=Math.random()*100+"vw";

angel.style.fontSize=(40+Math.random()*25)+"px";
angel.style.animationDuration=(12+Math.random()*8)+"s";

document.body.appendChild(angel);

setTimeout(()=>{
angel.remove();
},15000);

}

setInterval(createAngel,4000);

</script>

</body>
</html>
