<!DOCTYPE html>
<html>
<head>
<title>Love Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffdde1);
}

/* card */

.card{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
z-index:10;
animation:pop 1s ease;
position:relative;
max-width:90%;
width:350px;
box-sizing:border-box;
}

@keyframes pop{
0%{transform:scale(0.7);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h2{
color:#ff4d6d;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.yes{background:#ff4d6d;color:white;}
.no{background:#555;color:white;}

button:hover{
transform:scale(1.1);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#msg{
margin-top:10px;
font-weight:bold;
color:#ff4d6d;
}

/* hearts */

.heart{
position:absolute;
bottom:-50px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* Responsive for mobile */
@media (max-width:500px){
h2{font-size:16px;}
button{padding:10px 18px;font-size:14px;}
}

</style>
</head>

<body>

<div class="card">

<h2>
Unna patha theriyathu…<br>
Ana pesuna theriyum nee oru Lossu nu 😜<br>
Neeye sollu ama va illa ya?
</h2>

<button class="yes" onclick="yesClick()">Ama Naan Lossu 😅</button>

<button class="no" id="noBtn" onclick="noClick()">Illa Naan Nalla Ponnu 😎</button>

<p id="msg"></p>

</div>

<script>

let count=0;
let noBtn=document.getElementById("noBtn");
let msg=document.getElementById("msg");

/* YES BUTTON */
function yesClick(){
window.location.href="letter.html";
}

/* NO BUTTON */
function noClick(){

count++;

if(count==1){
msg.innerHTML="Apo konjam lossu dhaan 🤭";
}
else if(count==2){
msg.innerHTML="Nijam sollu 😜";
}
else if(count==3){
msg.innerHTML="Button ah pidika mudiyuma paakalam 😆";
noBtn.style.position="absolute";
moveButton();
}
else if(count<=6){
moveButton();
}
else{
msg.innerHTML="Seri seri... unaku option illa 😜";
noBtn.style.display="none";
}
}

function moveButton(){
let x=Math.random() * (window.innerWidth - noBtn.offsetWidth);
let y=Math.random() * (window.innerHeight - noBtn.offsetHeight);
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

/* floating hearts */
function createHeart(){
let heart=document.createElement("div");
heart.classList.add("heart");

let hearts=["❤️","💖","💕","💗"];
heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(30+Math.random()*30)+"px";
heart.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},10000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
